<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lantern Chat</title>
    <link rel="stylesheet" href="chat.css" />
    <link rel="stylesheet" href="../shared/chat-ui.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500&family=Source+Sans+3:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="../shared/theme-boot.js"></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <a class="brand-link" href="../newtab/newtab.html" title="New tab">
            <span class="mark" aria-hidden="true"></span>
            <span class="brand-name">Lantern</span>
          </a>
          <button type="button" class="icon-btn" id="btn-new" title="New chat" aria-label="New chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
        <div class="sidebar-label">Chats</div>
        <nav class="chat-list" id="chat-list" aria-label="Previous chats"></nav>
        <div class="thread-dock" id="thread-dock" hidden>
          <button type="button" class="thread-dock-head" id="thread-dock-toggle" aria-expanded="true">
            <span class="thread-dock-label">This thread</span>
            <span class="thread-dock-meta" id="thread-dock-meta"></span>
            <span class="thread-dock-chevron" aria-hidden="true"></span>
          </button>
          <div class="thread-dock-body" id="thread-dock-body"></div>
        </div>
        <div class="sidebar-foot">
          <button type="button" class="icon-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z" />
            </svg>
          </button>
          <a class="icon-btn" href="../options/options.html" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.3.6.9 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
            </svg>
          </a>
        </div>
      </aside>

      <div class="main">
        <header class="main-top">
          <button type="button" class="icon-btn sidebar-toggle" id="btn-sidebar" title="Toggle sidebar" aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M4 6h16M4 12h10M4 18h16" />
            </svg>
          </button>
          <h1 class="chat-title" id="chat-title">New chat</h1>
        </header>

        <div class="main-stage">
          <main class="messages" id="messages" aria-live="polite">
            <div class="empty" id="empty">
              <p class="empty-title">Start a conversation</p>
              <p class="empty-hint">Ask anything. Follow-ups stay in this thread.</p>
            </div>
          </main>

          <div class="agent-workspace" id="agent-workspace" hidden>
            <div class="agent-feed" id="agent-feed" aria-live="polite"></div>
          </div>

          <footer class="composer" id="composer">
            <div class="composer-dock">
              <p class="agent-notice" id="agent-notice" hidden>Agent mode — works in background tabs so this chat stays open. Stop anytime.</p>
              <div class="context-tabs-chat" id="context-tabs-chat" hidden>
                <button type="button" class="context-tabs-trigger" id="context-tabs-trigger" title="Add page context" aria-haspopup="true" aria-expanded="false">
                  <span class="context-tabs-label">Context</span>
                  <span class="context-tabs-count" id="context-count-chat">0</span>
                  <span class="context-tabs-chevron" aria-hidden="true">▾</span>
                </button>
                <div class="context-tabs-popup" id="context-tabs-popup" hidden>
                  <div class="context-tabs-list" id="context-list-chat"></div>
                </div>
              </div>
              <div class="composer-shell">
                <button type="button" class="attach-btn" id="btn-attach" title="Attach image" aria-label="Attach image">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M12 5v14M5 12h14" />
                  </svg>
                </button>
                <input type="file" id="file-input" accept="image/*" hidden />
                <textarea
                  id="input"
                  rows="2"
                  placeholder="Message Lantern…"
                  autocomplete="off"
                ></textarea>
                <div class="composer-bar">
                  <div class="mode-toggle" id="mode-toggle" role="group" aria-label="Chat mode">
                    <button type="button" class="mode-btn is-active" data-mode="chat" id="mode-chat">
                      Chat
                    </button>
                    <button type="button" class="mode-btn" data-mode="agent" id="mode-agent" title="Browser agent (enable in Settings)">
                      Agent
                    </button>
                  </div>
                  <div class="mp" id="model-picker">
                    <button
                      type="button"
                      class="mp-trigger"
                      id="mp-trigger"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                      aria-controls="mp-panel"
                    >
                      <span class="mp-trigger-kicker">Model</span>
                      <span class="mp-trigger-value" id="mp-value">Server default</span>
                      <span class="mp-chevron" aria-hidden="true"></span>
                    </button>
                    <div class="mp-panel" id="mp-panel" hidden role="dialog" aria-label="Choose model">
                      <div class="mp-search-wrap">
                        <input
                          type="search"
                          class="mp-search"
                          id="mp-search"
                          placeholder="Search providers…"
                          autocomplete="off"
                          spellcheck="false"
                        />
                      </div>
                      <div class="mp-view" id="mp-view-providers">
                        <div class="mp-panel-head">
                          <span class="mp-panel-title">Provider</span>
                        </div>
                        <div class="mp-list" id="mp-provider-list" role="listbox" aria-label="Providers"></div>
                      </div>
                      <div class="mp-view" id="mp-view-models" hidden>
                        <div class="mp-panel-head">
                          <button type="button" class="mp-back" id="mp-back" aria-label="Back to providers">
                            <span aria-hidden="true">←</span>
                            <span>Providers</span>
                          </button>
                          <span class="mp-panel-title" id="mp-models-title">Models</span>
                        </div>
                        <div class="mp-list" id="mp-model-list" role="listbox" aria-label="Models"></div>
                      </div>
                      <div class="mp-tooltip" id="mp-tooltip" hidden role="tooltip"></div>
                    </div>
                  </div>
                  <button type="button" class="send-btn" id="btn-send" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M5 12h14M13 6l6 6-6 6" />
                    </svg>
                  </button>
                </div>
              </div>
              <p class="hint" id="hint">
                <kbd>Enter</kbd> send
                <span class="sep">·</span>
                <kbd>Shift+Enter</kbd> newline
              </p>
            </div>
          </footer>
        </div>
      </div>
    </div>
    <script type="module" src="chat.js"></script>
  </body>
</html>
