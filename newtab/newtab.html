<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab</title>
    <link rel="stylesheet" href="newtab.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="../shared/theme-boot.js"></script>
  </head>
  <body>
    <div class="top-actions">
      <a class="icon-btn" id="btn-chats" href="../chat/chat.html" title="Open chats" aria-label="Open chats">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M4 6h16M4 12h12M4 18h8" />
        </svg>
      </a>
      <button type="button" class="icon-btn" id="btn-theme" title="Toggle light / dark" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z" />
        </svg>
      </button>
      <a class="icon-btn" href="../options/options.html" title="Settings" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.3.6.9 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
        </svg>
      </a>
    </div>

    <div class="shell">
      <main class="main">
        <p class="greeting" id="greeting">Good evening</p>

        <form class="search-form" id="form" autocomplete="off">
          <div class="search-shell" id="search-shell">
            <textarea
              id="query"
              name="query"
              rows="2"
              placeholder="Search or ask…"
              spellcheck="false"
              tabindex="0"
              autocomplete="off"
            ></textarea>
            <div class="composer-bar">
              <div class="mp-nt" id="model-picker-nt">
                <button type="button" class="mp-trigger-nt" id="mp-trigger-nt" aria-haspopup="listbox" aria-expanded="false">
                  <span class="mp-trigger-kicker">Model</span>
                  <span class="mp-trigger-value" id="mp-value-nt">Server default</span>
                  <span class="mp-chevron" aria-hidden="true"></span>
                </button>
                <div class="mp-panel-nt" id="mp-panel-nt" hidden role="dialog" aria-label="Choose model">
                  <div class="mp-view-nt" id="mp-view-providers-nt">
                    <div class="mp-panel-head">
                      <span class="mp-panel-title">Provider</span>
                    </div>
                    <div class="mp-list" id="mp-provider-list-nt" role="listbox" aria-label="Providers"></div>
                  </div>
                  <div class="mp-view-nt" id="mp-view-models-nt" hidden>
                    <div class="mp-panel-head">
                      <button type="button" class="mp-back-nt" id="mp-back-nt" aria-label="Back to providers">
                        <span aria-hidden="true">←</span><span>Providers</span>
                      </button>
                      <span class="mp-panel-title" id="mp-models-title-nt">Models</span>
                    </div>
                    <div class="mp-list" id="mp-model-list-nt" role="listbox" aria-label="Models"></div>
                  </div>
                </div>
              </div>
              <button type="button" class="attach-btn" id="btn-attach" title="Attach image" aria-label="Attach image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
              <input type="file" id="file-input" accept="image/*" hidden />
              <button type="submit" class="go-btn" id="go-btn" aria-label="Search" title="Enter · search">
                <!-- Search icon -->
                <svg class="go-icon go-icon-search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="7" />
                  <path d="M20 20l-3-3" />
                </svg>
                <!-- Chat icon -->
                <svg class="go-icon go-icon-chat" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <!-- Agent icon -->
                <svg class="go-icon go-icon-agent" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linejoin="round" />
                </svg>
              </button>
            </div>
            <div class="suggest-dropdown" id="suggest-dropdown" hidden></div>
          </div>
          <div class="mode-row-wrap">
            <div class="mode-row" id="mode-row" role="tablist" aria-label="Input mode">
            <button type="button" class="mode-tab" data-mode="search" role="tab" aria-selected="true">Search</button>
            <button type="button" class="mode-tab" data-mode="chat" role="tab" aria-selected="false">Chat</button>
            <button type="button" class="mode-tab" data-mode="agent" role="tab" aria-selected="false">Agent</button>
            <span class="mode-indicator" aria-hidden="true"></span>
          </div>
          </div>
          <p class="key-sub"><kbd>Tab</kbd> to cycle</p>
          <div class="context-tabs" id="context-tabs" hidden>
            <div class="context-tabs-head">
              <span class="context-tabs-label">Context tabs</span>
              <span class="context-tabs-count" id="context-count"></span>
            </div>
            <div class="context-tabs-list" id="context-list"></div>
          </div>
        </form>

        <section class="recent-chats" id="recent-chats" aria-label="Recent chats" hidden>
          <div class="section-head">
            <h2 class="section-label">Recent chats</h2>
            <a class="section-link" href="../chat/chat.html" id="link-all-chats">All chats</a>
          </div>
          <div class="recent-list" id="recent-list"></div>
        </section>

        <section class="bookmarks" id="bookmarks-section" aria-label="Pins">
          <div class="bookmarks-grid" id="bookmarks-grid"></div>

          <div class="pin-popover" id="pin-popover" hidden>
            <form class="pin-add-form" id="pin-add-form">
              <div class="pin-popover-title">Add pin</div>
              <input type="text" id="pin-title" placeholder="Title (optional)" autocomplete="off" />
              <input type="url" id="pin-url" placeholder="https://…" required autocomplete="off" />
              <div class="pin-add-actions">
                <button type="submit" class="bm-tool-btn primary">Save</button>
                <button type="button" class="bm-tool-btn" id="btn-cancel-pin">Cancel</button>
              </div>
              <button type="button" class="pin-import-link" id="btn-import-browser">
                Import from browser…
              </button>
            </form>
          </div>
        </section>

      </main>

      <footer class="foot">
        <span id="endpoint-label">local</span>
      </footer>
    </div>
    <script src="focus-boot.js"></script>
    <script type="module" src="newtab.js"></script>
  </body>
</html>
