<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lantern</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <link rel="stylesheet" href="../shared/chat-ui.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="../shared/theme-boot.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span class="brand-name">Lantern</span>
        </div>
        <div class="top-actions">
          <button type="button" class="icon-btn" id="btn-bookmark" title="Pin to Lantern new tab" aria-label="Pin to Lantern new tab" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M12 17.3 6.2 20.5l1.1-6.5L2.5 9.5l6.5-.9L12 2.8l2.9 5.8 6.5.9-4.8 4.5 1.1 6.5L12 17.3z" />
            </svg>
          </button>
          <button type="button" class="icon-btn" id="btn-clear" title="New chat" aria-label="New chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>

          <div class="menu-wrap" id="menu-wrap">
            <button
              type="button"
              class="icon-btn menu-trigger"
              id="btn-menu"
              title="More"
              aria-label="More options"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="top-menu"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="6" cy="12" r="1.6" />
                <circle cx="12" cy="12" r="1.6" />
                <circle cx="18" cy="12" r="1.6" />
              </svg>
              <span class="status-dot menu-status" id="status-dot" data-state="unknown" title="Server status"></span>
            </button>
            <div class="menu" id="top-menu" role="menu" hidden>
              <button type="button" class="menu-item" id="btn-theme" role="menuitem">
                <span class="menu-icon" aria-hidden="true">
                  <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="12" cy="12" r="4" />
                    <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
                  </svg>
                  <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z" />
                  </svg>
                </span>
                <span class="menu-label" id="theme-label">Dark mode</span>
              </button>
              <button type="button" class="menu-item" id="btn-health" role="menuitem">
                <span class="menu-icon" aria-hidden="true">
                  <span class="status-dot" id="status-dot-menu" data-state="unknown"></span>
                </span>
                <span class="menu-text">
                  <span class="menu-label">Server</span>
                  <span class="menu-meta" id="health-label">Checking…</span>
                </span>
              </button>
              <button type="button" class="menu-item" id="btn-settings" role="menuitem">
                <span class="menu-icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.3.6.9 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
                  </svg>
                </span>
                <span class="menu-label">Settings</span>
              </button>
            </div>
          </div>

          <button type="button" class="icon-btn" id="btn-close" title="Close panel" aria-label="Close panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
      </header>

      <!-- Model picker panel (hidden by default) -->
      <div class="mp-sidebar" id="mp-sidebar" hidden role="dialog" aria-label="Choose model">
        <div class="mp-sidebar-body">
          <div class="mp-view" id="mp-view-providers">
            <div class="mp-panel-head">
              <span class="mp-panel-title">Provider</span>
            </div>
            <div class="mp-list" id="mp-provider-list" role="listbox" aria-label="Providers"></div>
          </div>
          <div class="mp-view" id="mp-view-models" hidden>
            <div class="mp-panel-head">
              <button type="button" class="mp-back" id="mp-back" aria-label="Back to providers">
                <span aria-hidden="true">←</span>
                <span>Providers</span>
              </button>
              <span class="mp-panel-title" id="mp-models-title">Models</span>
            </div>
            <div class="mp-list" id="mp-model-list" role="listbox" aria-label="Models"></div>
          </div>
        </div>
      </div>

      <section class="page-chip" id="page-chip">
        <div class="page-chip-main">
          <span class="page-label">Page</span>
          <span class="page-title" id="page-title">Loading…</span>
        </div>
        <label class="toggle" title="Allow Lantern to read this page">
          <input type="checkbox" id="page-visible" checked />
          <span class="toggle-track"></span>
          <span class="toggle-text">Visible</span>
        </label>
      </section>

      <div class="actions" id="quick-actions" role="toolbar" aria-label="Quick actions"></div>

      <main class="messages" id="messages" aria-live="polite"></main>

      <!-- Agent workspace for confirmations -->
      <div class="agent-workspace" id="agent-workspace">
        <div class="agent-feed" id="agent-feed" aria-live="polite"></div>
      </div>

      <footer class="composer">
        <div class="composer-shell">
          <textarea
            id="input"
            rows="1"
            placeholder="Ask about this page…"
            autocomplete="off"
          ></textarea>
          <div class="composer-bar">
            <button type="button" class="model-trigger-composer" id="btn-model" title="Choose model" aria-label="Choose model">
              <span class="model-trigger-icon" id="model-trigger-icon"></span>
            </button>

            <div class="mode-toggle" id="mode-toggle" role="group" aria-label="Chat mode">
              <button type="button" class="mode-btn is-active" data-mode="chat" id="mode-chat" title="Chat">
                Chat
              </button>
              <button type="button" class="mode-btn" data-mode="agent" id="mode-agent" title="Browser agent (enable in Settings)">
                Agent
              </button>
            </div>

            <button type="button" class="send-btn" id="btn-send" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
        </div>
        <p class="hint" id="hint">local model</p>
      </footer>
    </div>

    <!-- Model picker tooltip (reused from chat) -->
    <div class="mp-tooltip" id="mp-tooltip" hidden role="tooltip"></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
